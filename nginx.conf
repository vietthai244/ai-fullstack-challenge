server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Rewrite cookie Path so browser sends rt cookie with /api/auth/* requests.
        # Backend sets Path=/auth; browser sees /api/auth/* URLs — without this
        # rewrite the cookie is never sent and /auth/refresh returns MISSING_REFRESH_TOKEN.
        proxy_cookie_path /auth /api/auth;
    }

    location /track/ {
        proxy_pass http://api:3000/track/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
